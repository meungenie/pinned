version: "3.8"
services:
  # 데이터베이스 서비스 설정
  db:
    image: postgres:15
    container_name: pinned_db_container
    restart: always
    env_file: ./backend/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432" # 내 컴퓨터의 5432 포트와 연결
    volumes:
      - pinned_db_data:/var/lib/postgresql/data

volumes:
  pinned_db_data:
