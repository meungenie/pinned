name: CI / Deploy to Dev

on:
  push:
    branches: [dev]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID:    project-9c52df7f-9c59-4739-9b4
  REGION:        asia-northeast3
  CLUSTER:       pinned-cluster
  ARTIFACT_REPO: pinned-app
  IMAGE:         backend
  NAMESPACE:     pinned-dev

jobs:
  # ── 0단계: 시크릿 스캔 ────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 1단계: 테스트 ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci

  # ── 2단계: 빌드 & 이미지 푸시 ────────────────────────────
  build-push:
    needs: [test, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}:dev-${{ github.sha }}"
          echo "image=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - name: Build & Push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image }} ./backend
          docker push ${{ steps.meta.outputs.image }}

  # ── 3단계: 보안 스캔 ──────────────────────────────────────
  security-scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-push.outputs.image }}
          format: json
          output: trivy-report.json
          exit-code: "0"
          ignore-unfixed: false
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install anthropic
      - name: AI Security Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/trivy_ai_review.py trivy-report.json \
            "${{ needs.build-push.outputs.image }}"

  # ── 4단계: 개발 환경 배포 (pinned-dev 네임스페이스) ──────
  deploy:
    needs: [security-scan, build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Apply dev namespace
        run: kubectl apply -f k8s/namespace-dev.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/backend/serviceaccount.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/backend/backendconfig.yaml  -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/backend/configmap.yaml      -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/backend/service.yaml        -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/backend/hpa.yaml            -n ${{ env.NAMESPACE }}

      - name: Create backend-secret
        run: |
          DB_PASS=$(gcloud secrets versions access latest \
            --secret=pinned-db-password \
            --project=${{ env.PROJECT_ID }})
          kubectl create secret generic backend-secret \
            --from-literal=DB_USER=pinned_user \
            --from-literal=DB_PASSWORD="${DB_PASS}" \
            -n ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend
        run: |
          sed "s|REGION-docker.pkg.dev/PROJECT_ID/pinned/backend:latest|${{ needs.build-push.outputs.image }}|g" \
            k8s/backend/deployment.yaml | \
            sed "s|namespace: pinned|namespace: ${{ env.NAMESPACE }}|g" | \
            kubectl apply -f -
          kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Apply Network Policy
        run: |
          sed "s|namespace: pinned|namespace: ${{ env.NAMESPACE }}|g" \
            k8s/network-policy/default-deny.yaml | kubectl apply -f -
          sed "s|namespace: pinned|namespace: ${{ env.NAMESPACE }}|g" \
            k8s/network-policy/backend-allow.yaml | kubectl apply -f -

      - name: Deployment summary
        run: |
          echo "### 개발 환경 배포 완료 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- 이미지: ${{ needs.build-push.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- 네임스페이스: ${{ env.NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.NAMESPACE }} >> $GITHUB_STEP_SUMMARY
