name: CI / Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID:    project-9c52df7f-9c59-4739-9b4
  REGION:        asia-northeast3
  CLUSTER:       pinned-cluster
  ARTIFACT_REPO: pinned-app
  IMAGE:         backend
  NAMESPACE:     pinned

jobs:
  # ── 0단계: 시크릿 스캔 ────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks secret scan (파일 내용 직접 스캔)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-git -v --exit-code 1

  # ── 1단계: 테스트 ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci

  # ── 2단계: 빌드 & 이미지 푸시 ────────────────────────────
  build-push:
    needs: [test, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          echo "image=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - name: Build & Push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image }} ./backend
          docker push ${{ steps.meta.outputs.image }}

  # ── 3단계: 보안 스캔 ──────────────────────────────────────
  security-scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-push.outputs.image }}
          format: json
          output: trivy-report.json
          exit-code: "0"
          ignore-unfixed: false
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install anthropic
      - name: AI Security Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/trivy_ai_review.py trivy-report.json \
            "${{ needs.build-push.outputs.image }}"

  # ── 4단계: 운영 환경 배포 → ArgoCD 동기화 ────────────────
  deploy:
    needs: [security-scan, build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}
      - name: Create/Update backend-secret
        run: |
          kubectl apply -f k8s/namespace.yaml
          DB_PASS=$(gcloud secrets versions access latest \
            --secret=pinned-db-password \
            --project=${{ env.PROJECT_ID }})
          JWT_SECRET=$(gcloud secrets versions access latest \
            --secret=jwt-secret \
            --project=${{ env.PROJECT_ID }})
          kubectl create secret generic backend-secret \
            --from-literal=DB_USER=pinned_user \
            --from-literal=DB_PASSWORD="${DB_PASS}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            -n ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Update prod image tag in kustomize overlay
        run: |
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" k8s/overlays/prod/kustomization.yaml
      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "chore: update prod image tag to ${{ github.sha }} [skip ci]"
          git pull --rebase origin main
          git push origin main
      - name: Deployment summary
        run: |
          echo "### 운영 배포 ArgoCD 동기화 완료 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- 이미지 태그: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- 네임스페이스: ${{ env.NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          echo "- ArgoCD가 k8s/overlays/prod 변경을 감지하여 자동 배포합니다" >> $GITHUB_STEP_SUMMARY
