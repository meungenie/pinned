name: Build & Deploy to GKE

on:
  push:
    branches: [main, dev]

permissions:
  contents: read
  id-token: write   # WIF 토큰 발급에 필요

env:
  PROJECT_ID: project-9c52df7f-9c59-4739-9b4
  REGION: asia-northeast3          # 서울
  CLUSTER: pinned-cluster
  ARTIFACT_REPO: pinned-app
  IMAGE: backend

jobs:
  # ── 0단계: 시크릿 스캔 ─────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 git 히스토리 스캔

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 1단계: 테스트 ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

  # ── 2단계: 빌드 & 이미지 푸시 ──────────────────────────
  build-push:
    needs: [test, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          echo "image=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image }} ./backend
          docker push ${{ steps.meta.outputs.image }}

  # ── 3단계: 보안 스캔 ────────────────────────────────────
  security-scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Trivy: 이미지 내 OS 패키지 + npm 패키지 취약점 스캔 (JSON 출력)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-push.outputs.image }}
          format: json
          output: trivy-report.json
          exit-code: "0"       # 여기서 실패시키지 않고 AI가 차단 여부 판단
          ignore-unfixed: false
          severity: "CRITICAL,HIGH,MEDIUM,LOW"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      # Claude가 스캔 결과를 분석해 GitHub Summary에 리포트 게시
      # CRITICAL 발견 시 exit(1) → 다음 단계(deploy) 차단
      - name: AI Security Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/trivy_ai_review.py trivy-report.json \
            "${{ needs.build-push.outputs.image }}"

  # ── 4단계: Kyverno 정책 배포 (deploy 전에 먼저 실행) ──────────────────────────
  # Kyverno webhook이 없는 상태에서 deploy가 실행돼야 정책 검증 오류 없음
  kyverno:
    needs: [build-push, security-scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Cleanup broken Kyverno webhooks
        run: |
          kubectl get validatingwebhookconfigurations -o name | grep kyverno | xargs kubectl delete --ignore-not-found || true
          kubectl get mutatingwebhookconfigurations -o name | grep kyverno | xargs kubectl delete --ignore-not-found || true

      - name: Install Kyverno
        run: |
          helm repo add kyverno https://kyverno.github.io/kyverno
          helm repo update
          helm upgrade --install kyverno kyverno/kyverno \
            --namespace kyverno \
            --create-namespace \
            --version 3.2.6 \
            --set admissionController.replicas=1 \
            --set backgroundController.replicas=1 \
            --set cleanupController.replicas=1 \
            --set reportsController.replicas=1 \
            --wait --timeout 10m

      - name: Apply Kyverno policies
        run: |
          kubectl apply -f k8s/kyverno/require-non-root.yaml
          kubectl apply -f k8s/kyverno/require-drop-all-capabilities.yaml
          kubectl apply -f k8s/kyverno/disallow-privilege-escalation.yaml

      - name: Kyverno summary
        run: |
          echo "### Kyverno 정책 배포 완료" >> $GITHUB_STEP_SUMMARY
          kubectl get clusterpolicy >> $GITHUB_STEP_SUMMARY

  # ── 5단계: GKE 배포 ────────────────────────────────────
  deploy:
    needs: [kyverno]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend/serviceaccount.yaml
          kubectl apply -f k8s/backend/backendconfig.yaml
          kubectl apply -f k8s/backend/configmap.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/backend/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Create backend-secret from Secret Manager
        run: |
          DB_PASS=$(gcloud secrets versions access latest \
            --secret=pinned-db-password \
            --project=${{ env.PROJECT_ID }})
          kubectl create secret generic backend-secret \
            --from-literal=DB_USER=pinned_user \
            --from-literal=DB_PASSWORD="${DB_PASS}" \
            -n pinned \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply backend deployment
        run: |
          sed "s|REGION-docker.pkg.dev/PROJECT_ID/pinned/backend:latest|${{ needs.build-push.outputs.image }}|g" \
            k8s/backend/deployment.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n pinned --timeout=5m

      - name: Apply Network Policy
        run: |
          kubectl apply -f k8s/network-policy/default-deny.yaml
          kubectl apply -f k8s/network-policy/backend-allow.yaml

      - name: Deployment summary
        run: |
          echo "### 배포 완료 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- 이미지: ${{ needs.build-push.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- 클러스터: ${{ env.CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n pinned >> $GITHUB_STEP_SUMMARY

  # ── 6단계: Falco 런타임 보안 배포 ──────────────────────────
  falco:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Add Falco Helm repo
        run: |
          helm repo add falcosecurity https://falcosecurity.github.io/charts
          helm repo update

      - name: Apply Falco namespace and Workload Identity SA
        run: |
          kubectl apply -f k8s/falco/namespace.yaml
          kubectl apply -f k8s/falco/falcosidekick-sa.yaml

      - name: Deploy Falco + Falcosidekick
        run: |
          helm upgrade --install falco falcosecurity/falco \
            --namespace falco \
            --version 4.18.0 \
            -f k8s/falco/values.yaml \
            --wait --timeout 10m

      - name: Falco summary
        run: |
          echo "### Falco 런타임 보안 배포 완료" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n falco >> $GITHUB_STEP_SUMMARY
