name: Build & Deploy to GKE

on:
  push:
    branches: [main, dev]

permissions:
  contents: read
  id-token: write   # WIF нҶ нҒ° л°ңкёүм—җ н•„мҡ”

env:
  PROJECT_ID: project-9c52df7f-9c59-4739-9b4
  REGION: asia-northeast3          # м„ңмҡё
  CLUSTER: pinned-cluster
  ARTIFACT_REPO: pinned-app
  IMAGE: backend

jobs:
  # в”Җв”Җ 0лӢЁкі„: мӢңнҒ¬лҰҝ мҠӨмә” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # м „мІҙ git нһҲмҠӨнҶ лҰ¬ мҠӨмә”

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # в”Җв”Җ 1лӢЁкі„: н…ҢмҠӨнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

  # в”Җв”Җ 2лӢЁкі„: л№Ңл“ң & мқҙлҜём§Җ н‘ёмӢң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  build-push:
    needs: [test, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          echo "image=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image }} ./backend
          docker push ${{ steps.meta.outputs.image }}

  # в”Җв”Җ 3лӢЁкі„: ліҙм•Ҳ мҠӨмә” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  security-scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Trivy: мқҙлҜём§Җ лӮҙ OS нҢЁнӮӨм§Җ + npm нҢЁнӮӨм§Җ м·Ём•Ҫм җ мҠӨмә” (JSON м¶ңл Ҙ)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-push.outputs.image }}
          format: json
          output: trivy-report.json
          exit-code: "0"       # м—¬кё°м„ң мӢӨнҢЁмӢңнӮӨм§Җ м•Ҡкі  AIк°Җ м°ЁлӢЁ м—¬л¶Җ нҢҗлӢЁ
          ignore-unfixed: false
          severity: "CRITICAL,HIGH,MEDIUM,LOW"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      # Claudeк°Җ мҠӨмә” кІ°кіјлҘј л¶„м„қн•ҙ GitHub Summaryм—җ лҰ¬нҸ¬нҠё кІҢмӢң
      # CRITICAL л°ңкІ¬ мӢң exit(1) вҶ’ лӢӨмқҢ лӢЁкі„(deploy) м°ЁлӢЁ
      - name: AI Security Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/trivy_ai_review.py trivy-report.json \
            "${{ needs.build-push.outputs.image }}"

  # в”Җв”Җ 4лӢЁкі„: Kyverno м •мұ… л°°нҸ¬ (deploy м „м—җ лЁјм Җ мӢӨн–ү) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Kyverno webhookмқҙ м—ҶлҠ” мғҒнғңм—җм„ң deployк°Җ мӢӨн–үлҸјм•ј м •мұ… кІҖмҰқ мҳӨлҘҳ м—ҶмқҢ
  kyverno:
    needs: [build-push, security-scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Cleanup broken Kyverno state
        run: |
          helm uninstall kyverno -n kyverno 2>/dev/null || true
          kubectl get validatingwebhookconfigurations -o name 2>/dev/null | grep kyverno | xargs kubectl delete --ignore-not-found || true
          kubectl get mutatingwebhookconfigurations -o name 2>/dev/null | grep kyverno | xargs kubectl delete --ignore-not-found || true
          kubectl delete crd -l app.kubernetes.io/name=kyverno --ignore-not-found 2>/dev/null || true
          sleep 15

      - name: Install Kyverno
        run: |
          helm repo add kyverno https://kyverno.github.io/kyverno
          helm repo update
          helm upgrade --install kyverno kyverno/kyverno \
            --namespace kyverno \
            --create-namespace \
            --version 3.2.6 \
            --set admissionController.replicas=1 \
            --set backgroundController.replicas=1 \
            --set cleanupController.replicas=1 \
            --set reportsController.replicas=1 \
            --no-hooks \
            --timeout 10m
          kubectl rollout status deployment/kyverno-admission-controller -n kyverno --timeout=5m

      - name: Apply Kyverno policies
        run: |
          kubectl apply -f k8s/kyverno/require-non-root.yaml
          kubectl apply -f k8s/kyverno/require-drop-all-capabilities.yaml
          kubectl apply -f k8s/kyverno/disallow-privilege-escalation.yaml

      - name: Kyverno summary
        run: |
          echo "### Kyverno м •мұ… л°°нҸ¬ мҷ„лЈҢ" >> $GITHUB_STEP_SUMMARY
          kubectl get clusterpolicy >> $GITHUB_STEP_SUMMARY

  # в”Җв”Җ 5лӢЁкі„: GKE л°°нҸ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy:
    needs: [kyverno, build-push]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend/serviceaccount.yaml
          kubectl apply -f k8s/backend/backendconfig.yaml
          kubectl apply -f k8s/backend/configmap.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/backend/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Create backend-secret from Secret Manager
        run: |
          DB_PASS=$(gcloud secrets versions access latest \
            --secret=pinned-db-password \
            --project=${{ env.PROJECT_ID }})
          kubectl create secret generic backend-secret \
            --from-literal=DB_USER=pinned_user \
            --from-literal=DB_PASSWORD="${DB_PASS}" \
            -n pinned \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply backend deployment
        run: |
          sed "s|REGION-docker.pkg.dev/PROJECT_ID/pinned/backend:latest|${{ needs.build-push.outputs.image }}|g" \
            k8s/backend/deployment.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n pinned --timeout=5m

      - name: Apply Network Policy
        run: |
          kubectl apply -f k8s/network-policy/default-deny.yaml
          kubectl apply -f k8s/network-policy/backend-allow.yaml

      - name: Deployment summary
        run: |
          echo "### л°°нҸ¬ мҷ„лЈҢ рҹҡҖ" >> $GITHUB_STEP_SUMMARY
          echo "- мқҙлҜём§Җ: ${{ needs.build-push.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- нҒҙлҹ¬мҠӨн„°: ${{ env.CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n pinned >> $GITHUB_STEP_SUMMARY

  # в”Җв”Җ 6лӢЁкі„: Falco лҹ°нғҖмһ„ ліҙм•Ҳ л°°нҸ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  falco:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Add Falco Helm repo
        run: |
          helm repo add falcosecurity https://falcosecurity.github.io/charts
          helm repo update

      - name: Apply Falco namespace and Workload Identity SA
        run: |
          kubectl apply -f k8s/falco/namespace.yaml
          kubectl apply -f k8s/falco/falcosidekick-sa.yaml

      - name: Deploy Falco + Falcosidekick
        run: |
          helm upgrade --install falco falcosecurity/falco \
            --namespace falco \
            --version 4.18.0 \
            -f k8s/falco/values.yaml \
            --wait --timeout 10m

      - name: Falco summary
        run: |
          echo "### Falco лҹ°нғҖмһ„ ліҙм•Ҳ л°°нҸ¬ мҷ„лЈҢ" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n falco >> $GITHUB_STEP_SUMMARY
